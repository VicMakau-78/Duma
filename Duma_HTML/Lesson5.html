<html>
    <head>
        <title>Document</title>
    </head>
    <body>
        <h2>HTML Forms</h2>
        <!-- The Form starts here -->
         <form action="">
            <fieldset>
                <legend>Personal Details</legend>
                <input type="text" placeholder="Your Name"><br><br>
                <input type="number" placeholder="Enter ID number"><br><br>
                <input type="email" placeholder="Enter Your Email Address"><br><br>
                <input type="password" placeholder="Password"><br><br>
                <label for="">Your DOB</label><br>
                <input type="date"><br><br>
            </fieldset><br>

            <fieldset>
                <label for=""> Your interests</label><br>
                <input type="checkbox"> Football &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
                <input type="checkbox"> Volleyball <br><br>

                <label for="">Your Gender</label><br>
                <input type="radio" name="Gender"> Male &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
                <input type="radio" name="Gender"> Female <br><br>

                <label for="">Select a Course</label><br>
                <select name="" id="">
                    <option value="">Engineering</option>
                    <option value="">Marketing</option>
                    <option value="">Law</option>
                    <option value="">Computer science</option>
                </select>
            </fieldset><br>

            <fieldset>
                <label for="">Leave your Comments</label><br><br>
                <textarea name="" id="" placeholder="Comments" cols="40" rows="10"></textarea>
            </fieldset><br>
            <input type="submit" value="Make Application"><br><br>
            <input type="reset">        
          </form>
        <!-- The Form ends here -->
    </body>
</html>
